<!DOCTYPE html>
<html lang="en">
<head>
    <title>statuesque mark</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden; /* disable scrolling / rubberband effect on mobile */
            height:100vh;
        }

        canvas {
            display: block;
            position: absolute;
            outline:0;
        }

        * {
            /* disable on touch highlights of html elements, especially on mobile! */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Premium Overlay Styling */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(20, 20, 35, 0.85) 0%, rgba(10, 10, 15, 0.95) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
            visibility: visible;
        }

        .overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .overlay-content {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-icon {
            color: #818cf8;
            filter: drop-shadow(0 0 8px rgba(129, 140, 248, 0.4));
            animation: phoneTilt 3s ease-in-out infinite;
        }

        @keyframes phoneTilt {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .overlay-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .overlay-description {
            font-size: 15px;
            line-height: 1.6;
            color: #94a3b8;
            margin: 0 0 32px;
        }

        .overlay-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .overlay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #6d70f2 0%, #5a52e6 100%);
        }

        .overlay-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.2);
        }

        .overlay-btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            color: #f87171;
            min-height: 20px;
            line-height: 1.5;
        }
        
        .status-msg.info {
            color: #94a3b8;
        }
    </style>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <meta itemprop="name" content="statuesque mark">
    <meta itemprop="description" content="made with cables">
    <meta itemprop="image" content="screenshot.png">
    <meta name="description" content="made with cables"/>

</head>
<body>
    <div id="sensor-permission-overlay" class="overlay">
        <div class="overlay-content">
            <div class="icon-container">
                <svg class="phone-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                </svg>
            </div>
            <h1 class="overlay-title">iPhone Motion Visualizer</h1>
            <p class="overlay-description">
                This project visualizes motion sensor data in WebGL. Please grant sensor access to display the gyroscope and accelerometer values.
            </p>
            <button id="enable-btn" class="overlay-btn">Enable Sensors & Start</button>
            <div id="status-message" class="status-msg"></div>
        </div>
    </div>

    <canvas id="glcanvas" width="100vw" height="100vh" tabindex="1"></canvas>

    
    <script type="text/javascript" src="js/cables.js"></script>
<script type="text/javascript" src="js/ops.js"></script>

    <script type="text/javascript"  src="js/cgl.js"></script>
<script type="text/javascript"  src="js/cgl_wireframes.js"></script>


    <script type="text/javascript">

        let cablesPatch = null;

        function showError(initiator,...args)
        {
            CABLES.logErrorConsole("[" + initiator + "]", ...args);
        }

        function patchInitialized(patch)
        {
            // You can now access the patch object (patch), register variable watchers and so on
            cablesPatch = patch;
        }

        function patchFinishedLoading(patch)
        {
            // The patch is ready now, all assets have been loaded
            const btn = document.getElementById('enable-btn');
            const requiresPermission = window.DeviceMotionEvent && typeof window.DeviceMotionEvent.requestPermission === 'function';
            if (!requiresPermission) {
                btn.textContent = "Start Visualization";
            }
        }

        document.addEventListener("CABLES.jsLoaded", function (event)
        {
            CABLES.patch = new CABLES.Patch({
                patchFile: 'js/statuesque_mark.json',
                "prefixAssetPath": "",
                "assetPath": "assets/",
                "jsPath": "js/",
                "glCanvasId": "glcanvas",
                "glCanvasResizeToWindow": true,
                "onError": showError,
                "onPatchLoaded": patchInitialized,
                "onFinishedLoading": patchFinishedLoading,
                "canvas": {"alpha":true, "premultipliedAlpha":true } // make canvas transparent
            });
        });

        // Handle permissions and start
        document.getElementById('enable-btn').addEventListener('click', async () => {
            const btn = document.getElementById('enable-btn');
            const status = document.getElementById('status-message');
            btn.disabled = true;
            status.textContent = "";

            try {
                // Check if browser requires user gesture permission (iOS 13+)
                if (window.DeviceMotionEvent && typeof window.DeviceMotionEvent.requestPermission === 'function') {
                    const motionRes = await window.DeviceMotionEvent.requestPermission();
                    
                    let orientationRes = "granted";
                    if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
                        orientationRes = await window.DeviceOrientationEvent.requestPermission();
                    }

                    if (motionRes === 'granted' && orientationRes === 'granted') {
                        status.className = "status-msg info";
                        status.textContent = "Access granted. Launching...";
                        triggerCablesPermission();
                        fadeOutOverlay();
                    } else {
                        status.className = "status-msg";
                        status.textContent = "Permission denied. Please allow sensor access in browser settings and reload.";
                        btn.disabled = false;
                    }
                } else {
                    // Non-iOS browser (Android/Desktop)
                    triggerCablesPermission();
                    fadeOutOverlay();
                }
            } catch (err) {
                console.error(err);
                status.className = "status-msg";
                status.textContent = "Error: " + err.message;
                btn.disabled = false;
            }
        });

        function triggerCablesPermission() {
            if (cablesPatch) {
                const motionOps = cablesPatch.getOpsByObjName("Ops.Devices.Mobile.MotionSensor_v2");
                if (motionOps && motionOps.length > 0) {
                    const op = motionOps[0];
                    const port = op.getPort("Request Permissions");
                    if (port) {
                        port.trigger();
                    }
                }
            }
        }

        function fadeOutOverlay() {
            const overlay = document.getElementById('sensor-permission-overlay');
            overlay.classList.add('fade-out');
        }

        // disable rubberband effect on mobile devices
        document.getElementById('glcanvas').addEventListener('touchmove', (e)=>{ e.preventDefault(); }, false);
    </script>
</body>
</html>
